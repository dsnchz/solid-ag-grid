name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      # advisory while solid-checker (v0.2.x) and ecosystem reactivity contracts mature
      - run: pnpm check:solid || echo "::warning::solid-checker reported findings (advisory)"
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test
      # informational coverage (behavioral parity is the real bar — no threshold gating)
      - name: Coverage summary
        run: pnpm vitest run --coverage --project unit --project ssr 2>&1 | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
