name: AG Grid compatibility watch

# AG Grid internals are not semver-governed: a v36 minor can move symbols
# this deep integration depends on. Build weekly against the newest ^36
# release so drift surfaces here instead of in user issues.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  latest-ag-grid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bump ag-grid-community to newest ^36
        run: pnpm update ag-grid-community
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test
      - name: Report newer majors and Solid beta drift (informational)
        if: always()
        run: |
          LATEST=$(npm view ag-grid-community dist-tags.latest)
          echo "ag-grid-community latest on npm: $LATEST" >> "$GITHUB_STEP_SUMMARY"
          PINNED=$(node -p "require('./package.json').devDependencies['solid-js']")
          NEXT=$(npm view solid-js dist-tags.next)
          if [ "$PINNED" != "$NEXT" ]; then
            echo "::warning::Solid beta drift: pinned $PINNED, next is $NEXT — run the beta-bump chore (re-check PENDING_ASYNC_UNTRACKED_READ sniffing + latest() semantics per refactor report)"
          fi
          echo "solid-js: pinned $PINNED / next $NEXT" >> "$GITHUB_STEP_SUMMARY"
